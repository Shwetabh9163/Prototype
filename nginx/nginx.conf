# =============================================================
# Nginx Load Balancer Configuration — Traffic Management Prototype
# =============================================================
# Nginx sits in front of 3 FastAPI backend servers and distributes
# incoming requests using round-robin load balancing.
#
# Architecture:
#   [Browser :8080] → [Nginx] → [backend1 | backend2 | backend3]
#                                      ↕
#                                   [Redis]
#
# Features:
#   - Round-robin load balancing across 3 backends
#   - Health checks (auto-removes failed backends)
#   - Serves the frontend HTML at /
#   - Proxies API requests to the upstream backends
#   - Passes client IP for rate limiting
# =============================================================

# Define the upstream group — Nginx will load balance across these
upstream app_backends {
    # Round Robin is the DEFAULT algorithm in Nginx
    # Requests cycle: backend1 → backend2 → backend3 → backend1 → ...

    # For Least Connections, uncomment:
    # least_conn;

    # For IP Hash (sticky sessions), uncomment:
    # ip_hash;

    # Backend servers — using Docker service names as hostnames
    # max_fails: if a server fails 3 times...
    # fail_timeout: ...mark it as down for 30 seconds before retrying
    server backend1:8000 max_fails=3 fail_timeout=30s;
    server backend2:8000 max_fails=3 fail_timeout=30s;
    server backend3:8000 max_fails=3 fail_timeout=30s;
}

server {
    # Listen on port 80 inside the container
    # docker-compose maps host port 8080 → container port 80
    listen 80;
    server_name localhost;

    # ─────────────────────────────────────────────
    # Frontend — serve the static HTML file
    # ─────────────────────────────────────────────
    location / {
        # Serve the frontend from the mounted volume
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────────
    # API — proxy all backend endpoints to the upstream
    # ─────────────────────────────────────────────

    # Data endpoint (caching demo)
    location /data {
        proxy_pass http://app_backends/data;
        include /etc/nginx/proxy_params;
    }

    # Rate limit test endpoint
    location /rate-test {
        proxy_pass http://app_backends/rate-test;
        include /etc/nginx/proxy_params;
    }

    # Cache flush endpoint
    location /flush-cache {
        proxy_pass http://app_backends/flush-cache;
        include /etc/nginx/proxy_params;
    }

    # Health check endpoint (used to verify backend is alive)
    location /health {
        proxy_pass http://app_backends/;
        include /etc/nginx/proxy_params;
    }

    # ─────────────────────────────────────────────
    # Error pages
    # ─────────────────────────────────────────────
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
